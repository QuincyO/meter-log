<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#13171C">
<title>Meter Log — Edit & Daily Log</title>
<link rel="stylesheet" href="css/edit.css">
</head>
<body>

  <div class="bar">
    <div class="title">Edit &amp; Daily Log</div>
    <div class="pill" id="status"><span class="dot"></span><span id="statusText">Loading…</span></div>
    <select class="navsel" id="navSel" aria-label="Go to view">
      <option value="log">Log</option>
      <option value="map">Map</option>
      <option value="analytics">Analytics</option>
      <option value="teams">Crew &amp; Teams</option>
      <option value="edit" selected>Edit &amp; Daily Log</option>
    </select>
  </div>

  <h1>Pick an installer &amp; day</h1>
  <p class="sub">Look up the workorders an installer logged on a day, correct any values, set their Departure / Returned times, then generate the daily-log PDF.</p>
  <div class="card">
    <div class="grid2">
      <div><label for="who">Installer</label><select id="who"><option value="">— choose —</option></select></div>
      <div><label for="day">Date</label><input id="day" type="date"></div>
    </div>
    <div class="actions"><button class="btn primary full" id="loadBtn">Load workorders</button></div>
  </div>

  <!-- Day bookends + generate (revealed after a load) -->
  <div id="daySection" class="hide">
    <h1>Day times &amp; daily log</h1>
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
        <div id="closedBadge"></div>
        <button class="btn" id="closeDay">Close day</button>
      </div>
      <div class="grid2">
        <div><label for="departure">Departure time <span style="font-weight:500">(left dock)</span></label><input id="departure" type="time"></div>
        <div><label for="returned">Returned to land</label><input id="returned" type="time"></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-weight:500;margin-top:8px">
        <input type="checkbox" id="includeDelays" checked style="width:auto;margin:0">
        Include delays &amp; travel time on PDF
      </label>
      <div class="actions">
        <button class="btn" id="saveTimes">Save times</button>
        <button class="btn primary" id="genLog">Generate daily log</button>
      </div>
    </div>

    <h1 id="stopsHead">Workorders</h1>
    <div id="stopList"></div>
  </div>

  <div class="toast" id="toast"></div>

<!-- jsPDF (UMD) for on-device daily-log rendering — classic script loads before the module -->
<script src="js/vendor/jspdf.umd.min.js"></script>
<script type="module" src="js/pages/edit.js"></script>
</body>
</html>

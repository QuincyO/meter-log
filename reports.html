<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#13171C">
<title>Meter Log — Reports</title>
<link rel="stylesheet" href="css/reports.css">
</head>
<body>

  <div class="bar">
    <div class="title">Reports</div>
    <div class="pill" id="status"><span class="dot"></span><span id="statusText">Loading…</span></div>
    <select class="navsel" id="navSel" aria-label="Go to view">
      <option value="log">Log</option>
      <option value="map">Map</option>
      <option value="analytics">Analytics</option>
      <option value="teams">Crew &amp; Teams</option>
      <option value="edit">Edit &amp; Daily Log</option>
      <option value="reports" selected>Reports</option>
      <option value="help">Help</option>
    </select>
  </div>

  <h1>Crew daily totals</h1>
  <p class="sub">Pick a sub foreman and a date to see their whole crew's day — tallies, whether each day has been closed out, and who hasn't logged anything yet. Close an open day right here — the full travel review is still available in Edit &amp; Daily Log.</p>
  <div class="card">
    <label for="sub">Sub foreman</label>
    <select id="sub"><option value="">— pick a sub —</option></select>
    <label for="day">Date</label>
    <input id="day" type="date">
  </div>

  <div id="report"></div>

  <div class="toast" id="toast"></div>

<script type="module" src="js/pages/reports.js"></script>
</body>
</html>
